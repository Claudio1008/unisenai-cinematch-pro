<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch Pro - Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1>CineMatch Pro</h1>
            <div class="links">
                <a href="index.html">Cadastro</a>
                <a href="catalogo.html">Catálogo</a>
                <a href="https://www.imdb.com/chart/top/" target="_blank">Sugestões</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <!-- Uso da tag aside para informações secundárias como exigido -->
        <aside class="estatisticas-panel">
            <h2>Estatísticas de Lazer</h2>
            <p>Total de minutos assistidos: <strong id="minutos-totais">0</strong></p>
        </aside>

        <section class="form-section">
            <h2>Cadastrar Nova Obra</h2>
            <form id="form-filme">
                <div class="form-group">
                    <label for="titulo">Título do Filme/Série</label>
                    <input type="text" id="titulo" required>
                </div>
                <div class="form-group">
                    <label for="duracao">Duração (em minutos)</label>
                    <input type="number" id="duracao" required min="1">
                </div>
                <div class="form-group">
                    <label for="capa">URL da Capa (Imagem)</label>
                    <input type="url" id="capa" required>
                </div>
                <div class="form-group">
                    <label for="youtubeId">ID do YouTube (Ex: dQw4w9WgXcQ)</label>
                    <input type="text" id="youtubeId" required>
                </div>
                <button type="submit" class="btn-submit">Salvar no Catálogo</button>
            </form>
        </section>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
